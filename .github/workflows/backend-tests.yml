name: Backend PR Tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    name: Backend unit tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: daylog
          POSTGRES_PASSWORD: test
          POSTGRES_DB: daylog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U daylog -d daylog_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgres://daylog:test@localhost:5432/daylog_test
      DATABASE_URL_TEST: postgres://daylog:test@localhost:5432/daylog_test
      JWT_SECRET: test-secret-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate:push

      - name: Run unit tests
        run: npm test
