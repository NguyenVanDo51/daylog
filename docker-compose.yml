services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: daylog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: daylog
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # chỉ localhost, không expose ra internet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daylog -d daylog"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c maintenance_work_mem=32MB
      -c work_mem=4MB

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          memory: 384M
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder          # stage có drizzle-kit
    env_file: .env
    command: npx drizzle-kit migrate
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate                # chỉ chạy khi gọi: docker compose --profile migrate run migrate

volumes:
  pgdata: